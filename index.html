<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<title>Dictionnaire Mancagne</title>
<link rel="manifest" href="#" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0f0e17;
    --surface: #1a1929;
    --surface2: #252440;
    --accent: #e8b84b;
    --accent2: #7c6af5;
    --text: #fffffe;
    --text-muted: #a7a9be;
    --border: #2e2d4a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    padding: 20px 20px 0;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .logo {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--accent);
    line-height: 1.1;
  }

  .header-text p {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 300;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 0;
  }

  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* SEARCH */
  .search-box {
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 105px;
    z-index: 99;
  }

  .search-input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    font-size: 16px;
    color: var(--text-muted);
  }

  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 40px 12px 40px;
    color: var(--text);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus {
    border-color: var(--accent);
  }

  .search-input::placeholder {
    color: var(--text-muted);
  }

  .clear-btn {
    position: absolute;
    right: 12px;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
    display: none;
    padding: 4px;
  }

  /* STATS */
  .stats {
    padding: 8px 20px;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg);
  }

  /* WORD LIST */
  .word-list {
    padding: 8px 0 80px;
  }

  .word-card {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    gap: 12px;
  }

  .word-card:hover, .word-card:active {
    background: var(--surface);
  }

  .word-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 10px;
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .word-badge.n { border-color: #4a9eff33; color: #4a9eff; }
  .word-badge.v { border-color: #4aff9e33; color: #4aff9e; }
  .word-badge.adj { border-color: #ff9e4a33; color: #ff9e4a; }
  .word-badge.num { border-color: #ff4a9e33; color: #ff4a9e; }
  .word-badge.adv { border-color: #9e4aff33; color: #9e4aff; }

  .word-content { flex: 1; min-width: 0; }

  .word-title {
    font-weight: 500;
    font-size: 15px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .word-sub {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  .word-arrow {
    color: var(--border);
    font-size: 16px;
    flex-shrink: 0;
  }

  /* HIGHLIGHT */
  mark {
    background: rgba(232, 184, 75, 0.3);
    color: var(--accent);
    border-radius: 3px;
    padding: 0 2px;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: none;
    align-items: flex-end;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open {
    display: flex;
  }

  .modal {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 24px 24px 40px;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    border: 1px solid var(--border);
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-type {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    background: var(--surface2);
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .modal-mancagne {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    color: var(--accent);
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .modal-francais {
    font-size: 18px;
    color: var(--text);
    font-weight: 400;
    margin-bottom: 20px;
  }

  .modal-divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }

  .modal-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .modal-value {
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
  }

  .modal-close {
    position: absolute;
    top: 16px;
    right: 20px;
    background: var(--surface2);
    border: none;
    color: var(--text-muted);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-size: 16px; margin-bottom: 6px; color: var(--text); }
  .empty-sub { font-size: 13px; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 16px;
  }

  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 4px;
    cursor: pointer;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 10px;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.2s;
  }

  .nav-btn.active { color: var(--accent); }
  .nav-btn span:first-child { font-size: 20px; }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 14px;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="logo">📖</div>
    <div class="header-text">
      <h1>Dictionnaire Mancagne</h1>
      <p>Sénégal · Guinée-Bissau · Gambie</p>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="setTab('fr-mc')" id="tab-fr-mc">🇫🇷 Français → Mancagne</div>
    <div class="tab" onclick="setTab('mc-fr')" id="tab-mc-fr">Mancagne → 🇫🇷</div>
  </div>
</div>

<!-- SEARCH -->
<div class="search-box">
  <div class="search-input-wrap">
    <span class="search-icon">🔍</span>
    <input
      type="text"
      class="search-input"
      id="searchInput"
      placeholder="Rechercher un mot..."
      oninput="onSearch()"
      autocomplete="off"
    />
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
  </div>
</div>

<!-- STATS -->
<div class="stats" id="stats">Chargement...</div>

<!-- WORD LIST -->
<div class="word-list" id="wordList">
  <div class="loading">⏳ Chargement du dictionnaire...</div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" style="position:relative;">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-type" id="modalType"></div>
    <div class="modal-mancagne" id="modalMancagne"></div>
    <div class="modal-francais" id="modalFrancais"></div>
    <div id="modalExtras"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-dict" onclick="showSection('dict')">
    <span>📖</span><span>Dictionnaire</span>
  </button>
  <button class="nav-btn" id="nav-nums" onclick="showSection('nums')">
    <span>🔢</span><span>Chiffres</span>
  </button>
  <button class="nav-btn" id="nav-info" onclick="showSection('info')">
    <span>ℹ️</span><span>À propos</span>
  </button>
</div>

function setTab(tab) {
  currentTab = tab;
  document.getElementById('tab-fr-mc').className = 'tab' + (tab==='fr-mc'?' active':'');
  document.getElementById('tab-mc-fr').className = 'tab' + (tab==='mc-fr'?' active':'');
  renderList();
}

function onSearch() {
  currentQuery = document.getElementById('searchInput').value;
  document.getElementById('clearBtn').style.display = currentQuery ? 'flex' : 'none';
  renderList();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  currentQuery = '';
  document.getElementById('clearBtn').style.display = 'none';
  renderList();
}

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
}

function getBadgeClass(type) {
  if (!type) return '';
  if (type.startsWith('n')) return 'n';
  if (type.startsWith('v')) return 'v';
  if (type.startsWith('adj')) return 'adj';
  if (type.startsWith('num')) return 'num';
  if (type.startsWith('adv')) return 'adv';
  return '';
}

function renderList() {
  if (currentSection !== 'dict') return;
  const list = document.getElementById('wordList');
  const query = currentQuery.toLowerCase().trim();

  let filtered = DATA;
  if (query) {
    filtered = DATA.filter(w => {
      if (currentTab === 'fr-mc') return w.f.toLowerCase().includes(query);
      return w.m.toLowerCase().includes(query);
    });
  }

  // Sort
  if (currentTab === 'fr-mc') {
    filtered = [...filtered].sort((a,b) => a.f.localeCompare(b.f, 'fr'));
  } else {
    filtered = [...filtered].sort((a,b) => a.m.localeCompare(b.m));
  }

  document.getElementById('stats').textContent =
    query ? `${filtered.length} résultat${filtered.length>1?'s':''} trouvé${filtered.length>1?'s':''}` :
    `${DATA.length} mots — Cliquez sur un mot pour les détails`;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">Aucun résultat</div>
      <div class="empty-sub">Essayez un autre mot</div>
    </div>`;
    return;
  }

  // Show max 100 for performance
  const toShow = filtered.slice(0, 100);
  const more = filtered.length - 100;

  list.innerHTML = toShow.map((w, i) => {
    const title = currentTab === 'fr-mc' ? w.f : w.m;
    const sub = currentTab === 'fr-mc' ? w.m : w.f;
    const titleHL = highlight(title, currentQuery);
    const badgeClass = getBadgeClass(w.t);
    return `<div class="word-card" onclick="openModal(${DATA.indexOf(w)})">
      <div class="word-content">
        <div class="word-title">${titleHL}</div>
        <div class="word-sub">${sub}</div>
      </div>
      ${w.t ? `<span class="word-badge ${badgeClass}">${w.t}</span>` : ''}
      <span class="word-arrow">›</span>
    </div>`;
  }).join('');

  if (more > 0 && query) {
    list.innerHTML += `<div style="text-align:center;padding:16px;color:var(--text-muted);font-size:13px;">
      + ${more} autres résultats — Précisez votre recherche
    </div>`;
  } else if (!query) {
    list.innerHTML += `<div style="text-align:center;padding:16px;color:var(--text-muted);font-size:13px;">
      Recherchez un mot pour voir plus de résultats
    </div>`;
  }
}

function openModal(idx) {
  const w = DATA[idx];
  document.getElementById('modalType').textContent = w.t || 'mot';
  document.getElementById('modalMancagne').textContent = w.m;
  document.getElementById('modalFrancais').textContent = w.f;

  let extras = '';
  if (w.e) {
    extras += `<div class="modal-divider"></div>
      <div class="modal-label">Exemple</div>
      <div class="modal-value">${w.e}</div>`;
  }
  if (w.n) {
    extras += `<div class="modal-divider"></div>
      <div class="modal-label">Note</div>
      <div class="modal-value">${w.n}</div>`;
  }
  document.getElementById('modalExtras').innerHTML = extras;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target.id === 'modalOverlay') {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}
